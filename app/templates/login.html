{% extends "base.html" %}
{% block title %}Connexion{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm mt-5">
      <div class="card-body p-4">
        <h1 class="h4 mb-4 text-center"><i class="bi bi-shop"></i> Administration</h1>
        <form method="post">
          <input type="hidden" name="next" value="{{ next }}">
          <div class="mb-3">
            <label class="form-label" for="username">Identifiant</label>
            <input class="form-control" type="text" id="username" name="username" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label" for="password">Mot de passe</label>
            <input class="form-control" type="password" id="password" name="password" required>
          </div>
          <button class="btn btn-dark w-100" type="submit">Se connecter</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
